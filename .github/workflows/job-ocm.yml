name: OCM
on: [push, workflow_dispatch, pull_request]

jobs:
  ocm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup ocm-cli
        run: |
          VERSION="0.26.0"
          ARCHIVE_FILE="ocm-${VERSION}-linux-amd64.tar.gz"
          URL="https://github.com/open-component-model/ocm/releases/download/v${VERSION}/$ARCHIVE_FILE"

          echo "Installing ocm-cli version v${VERSION} from ${URL}"

          curl -LsS -o ocm-cli.tgz "$URL"
          tar --overwrite -xvzf ocm-cli.tgz -C /usr/local/bin
          chmod a+x /usr/local/bin/ocm
      - name: Write .ocmconfig
        # TODO: setup credentials for final OCI Registry
        # For now we use ghcr.io of ki-reply
        run: |
          cat <<EOF > $HOME/.ocmconfig
          type: generic.config.ocm.software/v1
          configurations:
            - type: credentials.config.ocm.software
              consumers:
                - identity:
                    type: OCIRegistry
                    scheme: https
                    hostname: ghcr.io
                    pathprefix: openbao/ocm
                  credentials:
                    - type: Credentials
                      properties:
                        username: ${{ github.actor }}
                        password: ${{ secrets.GITHUB_TOKEN }}
          EOF
      - name: Create OCM component archive
        run: |
          CHART_VERSION=$(cat ./charts/openbao/Chart.yaml | grep version | awk '{print $2}')

          echo "Building OCM artifact for ${CHART_VERSION}"

          ocm add componentversions --create --templater=go --file=ocm/transport.ctf ocm/component-constructor.yaml -- \
                            COMPONENT_NAME="openbao.org/openbao" \
                            PROVIDER="openbao" \
                            OPENBAO_CHART_VERSION=${CHART_VERSION}
      - name: Sign OCM archive
        run: |
          echo "Signing OCM archive"

          jq . ./ocm/transport.ctf/artifact-index.json

          # TODO: Which key material to use for signing?
          # Should be stored in Github secrets...
          # echo "${secrets.OCM_SIGNING_KEY_PRIV}" > acme.priv

          # ocm sign componentversion --signature acme-sig --private-key=acme.priv ./ocm/transport.ctf

          jq . ./ocm/transport.ctf/artifact-index.json
      - name: Push OCM artifact to OCI
        run: |
          # ocm transfer ctf --overwrite ./ocm/transport.ctf OCIRegistry::ghcr.io/${GITHUB_REPOSITORY_OWNER}/ocm
